<header class="site-header" id="siteHeader">
  {{ $s := hugo.Data.settings }}
  <nav class="site-nav">
    <a class="site-title" href="{{ site.Home.RelPermalink }}">
      <img src="{{ "logo.png" | relURL }}" alt="{{ site.Title }} logo" class="site-logo">
      {{ site.Title }}
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      {{ with site.Menus.main }}
        {{ range . }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ i18n .Identifier | default .Name }}</a></li>
        {{ end }}
      {{ end }}
    </ul>
  </nav>
</header>
{{- $navJS := resources.Get "js/nav.js" | minify | fingerprint -}}
<script src="{{ $navJS.RelPermalink }}" integrity="{{ $navJS.Data.Integrity }}" crossorigin="anonymous" defer></script>
